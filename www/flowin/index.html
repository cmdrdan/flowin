<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Flowin – Your Idea, Live on the Web</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .wave {
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 50%, #a855f7 100%);
      clip-path: ellipse(150% 100% at 50% 0%);
    }
  </style>
</head>
<body class="bg-slate-50 text-gray-800 min-h-screen flex flex-col">

  <div class="wave px-6 pt-12 pb-20 text-center text-white">
    <h1 class="text-5xl font-bold tracking-tight">Flowin</h1>
    <p class="mt-3 text-xl font-light opacity-90">Turn your idea into a real website — no tech skills needed</p>
  </div>

  <div class="flex-1 flex items-center justify-center px-6 -mt-10">
    <div class="max-w-lg w-full text-center bg-white rounded-2xl shadow-xl p-10">
      <h2 class="text-2xl font-semibold text-gray-900 mb-3">Tell us about your idea</h2>
      <p class="text-gray-500 mb-8">Answer a few simple questions and we'll build your website. Takes about two minutes.</p>
      <a href="/editor.html"
         class="inline-block px-10 py-4 bg-indigo-600 text-white text-lg font-semibold rounded-xl hover:bg-indigo-700 shadow-lg hover:shadow-xl transition-all">
        Let's get started
      </a>
      <p class="mt-6 text-sm text-gray-400">
        Already know HTML? <a href="/editor.html?mode=manual" class="underline hover:text-gray-600">Code it yourself</a>
      </p>
    </div>
  </div>

  <footer class="text-center text-sm text-gray-400 p-6 mt-auto">
    Flowin — the fastest way from idea to live site
  </footer>
</body>
</html>

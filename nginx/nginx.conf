worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    ssl_certificate     /etc/letsencrypt/live/flowin.one/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/flowin.one/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Trust Cloudflare proxy IPs for real visitor IP
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    # Cloudflare IPv6
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;

    # API upstream
    upstream api {
        server api:8000;
    }

    # HTTP -> HTTPS redirect
    server {
        listen 80;
        server_name *.flowin.one flowin.one;
        return 301 https://$host$request_uri;
    }

    # Main landing page: flowin.one
    server {
        listen 443 ssl;
        server_name flowin.one www.flowin.one;

        root /var/www/flowin.one;
        index index.html;

        location / {
            try_files $uri $uri/ =404;
        }
    }

    # Editor: editor.flowin.one
    server {
        listen 443 ssl;
        server_name editor.flowin.one;

        root /var/www/editor.flowin.one;
        index index.html;

        location ~* \.(js|css)$ {
            add_header Cache-Control "no-cache, must-revalidate";
            try_files $uri =404;
        }

        location / {
            try_files $uri $uri/ =404;
        }
    }

    # API proxy: api.flowin.one
    server {
        listen 443 ssl;
        server_name api.flowin.one;

        location / {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }
    }

    # Wildcard: *.flowin.one (published sites)
    server {
        listen 443 ssl default_server;
        server_name ~^(?<subdomain>.+)\.flowin\.one$;

        root /var/www/flowin-sites/$subdomain;
        index index.html;

        location / {
            add_header Cache-Control "public, max-age=3600, s-maxage=86400";
            try_files $uri $uri/ =404;
        }
    }
}

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    ssl_certificate     /etc/letsencrypt/live/flowin.one/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/flowin.one/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # API upstream
    upstream api {
        server api:8000;
    }

    # HTTP -> HTTPS redirect
    server {
        listen 80;
        server_name *.flowin.one flowin.one;
        return 301 https://$host$request_uri;
    }

    # Main landing page: flowin.one
    server {
        listen 443 ssl;
        server_name flowin.one www.flowin.one;

        root /var/www/flowin.one;
        index index.html;

        location / {
            try_files $uri $uri/ =404;
        }
    }

    # Editor: editor.flowin.one
    server {
        listen 443 ssl;
        server_name editor.flowin.one;

        root /var/www/editor.flowin.one;
        index index.html;

        location ~* \.(js|css)$ {
            add_header Cache-Control "no-cache, must-revalidate";
            try_files $uri =404;
        }

        location / {
            try_files $uri $uri/ =404;
        }
    }

    # API proxy: api.flowin.one
    server {
        listen 443 ssl;
        server_name api.flowin.one;

        location / {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }
    }

    # Wildcard: *.flowin.one (published sites)
    server {
        listen 443 ssl default_server;
        server_name ~^(?<subdomain>.+)\.flowin\.one$;

        root /var/www/flowin-sites/$subdomain;
        index index.html;

        location / {
            try_files $uri $uri/ =404;
        }
    }
}

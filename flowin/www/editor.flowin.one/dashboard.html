<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7766158014274520" crossorigin="anonymous"></script>
  <title>Flowin Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-white to-indigo-50 min-h-screen text-gray-800">
  <nav class="flex items-center justify-between px-6 py-3 bg-white shadow-sm">
    <div class="flex items-center gap-4">
      <a href="/" class="text-xl font-bold text-indigo-700">Flowin</a>
      <a href="/index.html" class="text-sm text-gray-500 hover:text-indigo-600">Editor</a>
    </div>
    <div id="auth-container"></div>
  </nav>

  <main class="max-w-5xl mx-auto px-4 py-8">
    <!-- Stats Section (populated by JS) -->
    <div id="stats-section" class="hidden"></div>

    <div class="flex items-center justify-between mb-8">
      <h1 class="text-3xl font-bold text-indigo-700">My Sites</h1>
      <a href="/index.html?mode=ai" class="px-5 py-2.5 bg-indigo-600 text-white rounded-lg font-semibold hover:bg-indigo-700 transition">
        + New Site
      </a>
    </div>

    <div id="sites-loading" class="text-center py-12 text-gray-400">Loading your sites...</div>
    <div id="sites-empty" class="hidden text-center py-16">
      <p class="text-gray-400 text-lg mb-4">You haven't created any sites yet.</p>
      <a href="/index.html?mode=ai" class="px-6 py-3 bg-indigo-600 text-white rounded-lg font-semibold hover:bg-indigo-700 transition">
        Create Your First Site
      </a>
    </div>
    <div id="sites-grid" class="hidden grid gap-4 sm:grid-cols-2 lg:grid-cols-3"></div>
  </main>

  <!-- Stripe Pricing Table -->
  <div id="pricing-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
    <div class="bg-white rounded-2xl shadow-xl p-6 max-w-3xl w-full mx-4 max-h-[90vh] overflow-y-auto relative">
      <button onclick="closePricingModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 text-xl">&times;</button>
      <h2 class="text-2xl font-bold text-indigo-700 mb-4">Upgrade Your Plan</h2>
      <script async src="https://js.stripe.com/v3/pricing-table.js"></script>
      <stripe-pricing-table pricing-table-id="prctbl_1T9xx7I2jVBFZfugUcns9ktT"
        publishable-key="pk_live_51S3FJDI2jVBFZfugTgmqDjbyKgbgRsM6tNhIpjDdSrUSnVKQPugHUrosTDpUXYios8gHVQLrmjGgUdhMWFzWhGKp001clJLMVn">
      </stripe-pricing-table>
    </div>
  </div>

  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <script>window.TURNSTILE_SITE_KEY = '0x4AAAAAACm9X_EtjM6OTfQo';</script>
  <script src="auth.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Flowin Editor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/monaco-editor@0.34.1/min/vs/loader.js"></script>
  <style>
    body { margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
    .editor-layout { flex: 1; display: flex; overflow: hidden; }
    .sidebar { width: 30%; min-width: 320px; max-width: 480px; display: flex; flex-direction: column; border-right: 1px solid #e5e7eb; background: #fafafa; }
    .preview-panel { flex: 1; display: flex; flex-direction: column; background: #f1f5f9; }
    .preview-frame-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 16px; overflow: hidden; }
    .preview-frame-wrap iframe { background: white; border: 1px solid #e2e8f0; border-radius: 8px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); transition: width 0.3s, height 0.3s; }
    .preview-frame-wrap iframe.desktop { width: 100%; height: 100%; }
    .preview-frame-wrap iframe.tablet { width: 768px; height: 100%; max-width: 100%; }
    .preview-frame-wrap iframe.mobile { width: 375px; height: 100%; max-width: 100%; }
    #editor { flex: 1; min-height: 0; }
    .sidebar-tabs { display: flex; border-bottom: 1px solid #e5e7eb; }
    .sidebar-tabs button { flex: 1; padding: 10px; font-size: 0.85rem; font-weight: 600; color: #6b7280; background: transparent; border: none; cursor: pointer; border-bottom: 2px solid transparent; transition: color 0.2s, border-color 0.2s; }
    .sidebar-tabs button.active { color: #4f46e5; border-bottom-color: #4f46e5; }
    .sidebar-content { flex: 1; overflow-y: auto; padding: 16px; }
    .sidebar-content.hidden { display: none; }
    .device-toggle button { padding: 6px 12px; font-size: 0.75rem; border-radius: 6px; border: 1px solid #d1d5db; background: white; cursor: pointer; transition: all 0.2s; }
    .device-toggle button.active { background: #4f46e5; color: white; border-color: #4f46e5; }
    .refine-bar { display: flex; gap: 8px; padding: 12px 16px; border-top: 1px solid #e5e7eb; background: white; }
    .refine-bar input { flex: 1; padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 0.85rem; }
    .refine-bar button { padding: 8px 16px; background: #7c3aed; color: white; border: none; border-radius: 8px; font-weight: 600; font-size: 0.85rem; cursor: pointer; white-space: nowrap; }
    .refine-bar button:hover { background: #6d28d9; }
    .toast { position: fixed; bottom: 24px; right: 24px; padding: 12px 20px; border-radius: 10px; font-size: 0.9rem; font-weight: 500; color: white; z-index: 1000; transform: translateY(100px); opacity: 0; transition: all 0.3s; }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { background: #16a34a; }
    .toast.error { background: #dc2626; }
    .toast.info { background: #4f46e5; }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      .editor-layout.show-sidebar .sidebar { display: flex; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 50; }
    }
  </style>
</head>
<body class="bg-white text-gray-800">
  <!-- Nav -->
  <nav class="flex items-center justify-between px-4 py-2 bg-white border-b border-gray-200 z-10">
    <div class="flex items-center gap-3">
      <a href="/" class="text-lg font-bold text-indigo-700">Flowin</a>
      <a href="/dashboard.html" class="text-xs text-gray-500 hover:text-indigo-600">Dashboard</a>
    </div>
    <div class="flex items-center gap-3">
      <div class="device-toggle flex gap-1">
        <button data-device="mobile" title="Mobile">M</button>
        <button data-device="tablet" title="Tablet">T</button>
        <button data-device="desktop" title="Desktop" class="active">D</button>
      </div>
      <button id="toggle-code" class="px-3 py-1.5 text-xs font-semibold border rounded-lg hover:bg-gray-50">View Code</button>
      <button id="publish-button" class="px-4 py-1.5 bg-indigo-600 text-white text-sm font-semibold rounded-lg hover:bg-indigo-700 transition">Publish</button>
      <div id="auth-container"></div>
    </div>
  </nav>

  <div class="editor-layout" id="editor-layout">
    <!-- Sidebar: AI + Intake + Code -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-tabs">
        <button data-tab="ai" class="active">AI</button>
        <button data-tab="intake">Setup</button>
        <button data-tab="code" class="hidden" id="code-tab-btn">Code</button>
      </div>

      <!-- AI Tab -->
      <div class="sidebar-content" id="tab-ai">
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Describe your site</label>
            <textarea id="prompt" rows="4" class="w-full border rounded-lg p-3 text-sm resize-none" placeholder="A portfolio site for a photographer with a dark theme, gallery grid, and contact form..."></textarea>
          </div>
          <button id="generate-button" class="w-full px-4 py-2.5 bg-pink-600 text-white rounded-lg hover:bg-pink-700 font-semibold text-sm transition">
            Generate with AI
          </button>
          <div id="template-section">
            <p class="text-xs text-gray-500 font-semibold mb-2 uppercase tracking-wide">Or start from a template</p>
            <div id="templates-list" class="space-y-2"></div>
          </div>
        </div>
      </div>

      <!-- Intake/Setup Tab -->
      <div class="sidebar-content hidden" id="tab-intake">
        <form id="intake-form" class="space-y-4">
          <label class="flex flex-col text-sm gap-1">
            <span class="font-semibold text-gray-700">Site name</span>
            <input type="text" name="siteName" class="border rounded px-2 py-2 text-sm" placeholder="My Awesome Site" />
          </label>

          <div>
            <h3 class="font-semibold text-gray-700 text-sm mb-2">What are you building?</h3>
            <div class="grid gap-1.5 grid-cols-2">
              <label class="flex items-center gap-2 border rounded-lg px-2 py-1.5 cursor-pointer hover:border-indigo-300 text-xs">
                <input type="radio" name="sitePurpose" value="resume" class="text-indigo-600" checked />
                Resume / CV
              </label>
              <label class="flex items-center gap-2 border rounded-lg px-2 py-1.5 cursor-pointer hover:border-indigo-300 text-xs">
                <input type="radio" name="sitePurpose" value="portfolio" class="text-indigo-600" />
                Portfolio
              </label>
              <label class="flex items-center gap-2 border rounded-lg px-2 py-1.5 cursor-pointer hover:border-indigo-300 text-xs">
                <input type="radio" name="sitePurpose" value="business" class="text-indigo-600" />
                Business
              </label>
              <label class="flex items-center gap-2 border rounded-lg px-2 py-1.5 cursor-pointer hover:border-indigo-300 text-xs">
                <input type="radio" name="sitePurpose" value="event" class="text-indigo-600" />
                Event
              </label>
              <label class="flex items-center gap-2 border rounded-lg px-2 py-1.5 cursor-pointer hover:border-indigo-300 text-xs">
                <input type="radio" name="sitePurpose" value="other" class="text-indigo-600" />
                Other
              </label>
            </div>
          </div>

          <div>
            <h3 class="font-semibold text-gray-700 text-sm mb-2">Color scheme</h3>
            <div class="grid gap-1.5 grid-cols-2">
              <label class="flex items-center gap-2 border rounded-lg px-2 py-1.5 cursor-pointer hover:border-indigo-300 text-xs">
                <input type="radio" name="colorScheme" value="calm" class="text-indigo-600" checked />
                <span class="w-2.5 h-2.5 rounded-full" style="background:#4f46e5"></span> Blues
              </label>
              <label class="flex items-center gap-2 border rounded-lg px-2 py-1.5 cursor-pointer hover:border-indigo-300 text-xs">
                <input type="radio" name="colorScheme" value="sunrise" class="text-indigo-600" />
                <span class="w-2.5 h-2.5 rounded-full" style="background:#f97316"></span> Warm
              </label>
              <label class="flex items-center gap-2 border rounded-lg px-2 py-1.5 cursor-pointer hover:border-indigo-300 text-xs">
                <input type="radio" name="colorScheme" value="forest" class="text-indigo-600" />
                <span class="w-2.5 h-2.5 rounded-full" style="background:#16a34a"></span> Green
              </label>
              <label class="flex items-center gap-2 border rounded-lg px-2 py-1.5 cursor-pointer hover:border-indigo-300 text-xs">
                <input type="radio" name="colorScheme" value="minimal" class="text-indigo-600" />
                <span class="w-2.5 h-2.5 rounded-full" style="background:#111827"></span> Minimal
              </label>
            </div>
          </div>

          <label class="flex flex-col text-sm gap-1">
            <span class="font-semibold text-gray-700">Extra notes</span>
            <textarea name="extraNotes" rows="2" class="border rounded px-2 py-2 text-sm" placeholder="Any specific requirements..."></textarea>
          </label>

          <button type="button" id="analyze-needs" class="w-full px-4 py-2 bg-indigo-600 text-white font-semibold rounded-lg hover:bg-indigo-700 transition text-sm">
            Apply Settings
          </button>
        </form>

        <div id="intake-summary" class="mt-4 hidden">
          <div class="p-3 rounded-lg bg-indigo-50 text-xs text-indigo-900" id="intake-summary-text"></div>
        </div>
        <div id="database-advice" class="mt-2 hidden">
          <div class="p-3 rounded-lg bg-green-50 text-xs text-green-900">
            <p class="font-semibold">Dynamic features detected</p>
            <p id="database-advice-line">We'll set up data storage for forms, calendars, or logins.</p>
          </div>
        </div>
        <div id="static-advice" class="mt-2 hidden">
          <div class="p-3 rounded-lg bg-blue-50 text-xs text-blue-900">
            <p class="font-semibold">Simple static site</p>
            <p>No extra services needed.</p>
          </div>
        </div>
        <div id="supabase-section" class="hidden"></div>
        <div id="accounts-credentials" class="hidden"></div>
      </div>

      <!-- Code Tab (shown when "View Code" active) -->
      <div class="sidebar-content hidden p-0" id="tab-code" style="padding:0">
        <div id="editor" style="height: 100%; min-height: 300px;"></div>
      </div>

      <!-- Refine bar at bottom -->
      <div class="refine-bar">
        <input type="text" id="refine-input" placeholder="Refine: change the header color..." />
        <button id="refine-button">Refine</button>
      </div>
    </div>

    <!-- Preview Panel -->
    <div class="preview-panel">
      <div class="preview-frame-wrap">
        <iframe id="preview" class="desktop" sandbox="allow-scripts allow-same-origin"></iframe>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <!-- Hidden elements for compatibility with app.js -->
  <p id="result" class="hidden"></p>
  <div id="prompt-section" class="hidden"></div>
  <div id="editor-section" class="hidden"></div>
  <p id="database-cost" class="hidden"></p>
  <span id="initial-username-hint" class="hidden"></span>
  <input id="initial-username" class="hidden" />

  <!-- Stripe Pricing Modal (for upgrade prompts) -->
  <div id="pricing-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
    <div class="bg-white rounded-2xl shadow-xl p-6 max-w-3xl w-full mx-4 max-h-[90vh] overflow-y-auto relative">
      <button onclick="closePricingModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 text-xl">&times;</button>
      <h2 class="text-2xl font-bold text-indigo-700 mb-4">Upgrade Your Plan</h2>
      <script async src="https://js.stripe.com/v3/pricing-table.js"></script>
      <stripe-pricing-table pricing-table-id="prctbl_1T9xx7I2jVBFZfugUcns9ktT"
        publishable-key="pk_live_51S3FJDI2jVBFZfugTgmqDjbyKgbgRsM6tNhIpjDdSrUSnVKQPugHUrosTDpUXYios8gHVQLrmjGgUdhMWFzWhGKp001clJLMVn">
      </stripe-pricing-table>
    </div>
  </div>

  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <script>window.TURNSTILE_SITE_KEY = '0x4AAAAAACm9X_EtjM6OTfQo';</script>
  <script src="loading.js?v=2"></script>
  <script src="auth.js?v=2"></script>
  <script src="demo.js?v=2"></script>
  <script src="preflight.js?v=2"></script>
  <script src="app.js?v=2"></script>
  <script src="ads.js?v=2"></script>
  <script>
    // Sidebar tabs
    document.querySelectorAll('.sidebar-tabs button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.sidebar-tabs button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.sidebar-content').forEach(c => c.classList.add('hidden'));
        const tab = document.getElementById('tab-' + btn.dataset.tab);
        if (tab) tab.classList.remove('hidden');
      });
    });

    // Device toggles
    document.querySelectorAll('.device-toggle button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.device-toggle button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const preview = document.getElementById('preview');
        if (preview) {
          preview.className = btn.dataset.device;
        }
      });
    });

    // Toggle code view
    const toggleCodeBtn = document.getElementById('toggle-code');
    const codeTabBtn = document.getElementById('code-tab-btn');
    let codeVisible = false;
    toggleCodeBtn?.addEventListener('click', () => {
      codeVisible = !codeVisible;
      toggleCodeBtn.textContent = codeVisible ? 'Hide Code' : 'View Code';
      codeTabBtn?.classList.toggle('hidden', !codeVisible);
      if (codeVisible) {
        codeTabBtn?.click();
      } else {
        document.querySelector('.sidebar-tabs button[data-tab="ai"]')?.click();
      }
    });

    // Refine with AI
    const refineBtn = document.getElementById('refine-button');
    const refineInput = document.getElementById('refine-input');
    refineBtn?.addEventListener('click', async () => {
      if (!refineInput?.value.trim() || !window.editor) return;
      if (!isLoggedIn()) {
        const instruction = refineInput.value.trim();
        refineInput.value = '';
        runDemoRefine(instruction);
        return;
      }
      const instruction = refineInput.value.trim();
      refineInput.value = '';
      showLoading();

      try {
        const res = await fetch('https://api.flowin.one/generate/refine', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', ...authHeaders() },
          body: JSON.stringify({ html: window.editor.getValue(), instruction }),
        });
        if (!res.ok) throw new Error('Refine failed');
        const data = await res.json();
        window.editor.setValue(data.html);
        const preview = document.getElementById('preview');
        if (preview) preview.srcdoc = data.html;
        showToast('Refined!', 'success');
      } catch (err) {
        showToast('Refine failed: ' + err.message, 'error');
      } finally {
        hideLoading();
      }
    });

    refineInput?.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') refineBtn?.click();
    });

    // Toast helper
    function showToast(message, type = 'info') {
      const toast = document.getElementById('toast');
      if (!toast) return;
      toast.textContent = message;
      toast.className = `toast ${type} show`;
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // Pricing modal
    function handleUpgrade() {
      const modal = document.getElementById('pricing-modal');
      if (!modal) return;
      const user = getUser();
      if (user?.email) {
        const table = modal.querySelector('stripe-pricing-table');
        if (table) table.setAttribute('customer-email', user.email);
      }
      modal.classList.remove('hidden');
    }
    function closePricingModal() {
      document.getElementById('pricing-modal')?.classList.add('hidden');
    }
    document.addEventListener('click', (e) => {
      const modal = document.getElementById('pricing-modal');
      if (modal && e.target === modal) closePricingModal();
    });

    // Load templates
    async function loadTemplates() {
      try {
        const res = await fetch('https://api.flowin.one/templates');
        const data = await res.json();
        const list = document.getElementById('templates-list');
        if (!list || !data.templates) return;
        data.templates.forEach(t => {
          const btn = document.createElement('button');
          btn.className = 'w-full text-left p-3 bg-white border rounded-lg hover:border-indigo-300 transition text-xs';
          btn.innerHTML = `<span class="font-semibold text-gray-800">${t.name}</span><br><span class="text-gray-500">${t.description}</span>`;
          btn.addEventListener('click', async () => {
            try {
              const detail = await fetch(`https://api.flowin.one/templates/${t.id}`);
              const tmpl = await detail.json();
              if (tmpl.html && window.editor) {
                window.editor.setValue(tmpl.html);
                const preview = document.getElementById('preview');
                if (preview) preview.srcdoc = tmpl.html;
                showToast(`Loaded "${t.name}" template`, 'success');
              }
            } catch (err) {
              showToast('Failed to load template', 'error');
            }
          });
          list.appendChild(btn);
        });
      } catch (e) {
        // Templates endpoint not available, that's fine
      }
    }
    loadTemplates();
  </script>
</body>
</html>

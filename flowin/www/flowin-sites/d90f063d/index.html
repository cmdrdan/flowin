<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar Site</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #fff;
            color: #000;
        }

        h1 {
            color: #f77f00;
            text-align: center;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
        }

        .day {
            border: 1px solid #000;
            padding: 5px;
            background-color: #f77f00;
            color: #fff;
            text-align: center;
        }

        .note {
            margin-top: 10px;
        }

        textarea {
            width: 100%;
            height: 100px;
            padding: 5px;
            resize: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Calendar Site</h1>
        <div class="calendar">
            <div class="day"><span>1</span><div class="note"><textarea></textarea></div></div>
            <div class="day"><span>2</span><div class="note"><textarea></textarea></div></div>
            <div class="day"><span>3</span><div class="note"><textarea></textarea></div></div>
            <div class="day"><span>4</span><div class="note"><textarea></textarea></div></div>
            <div class="day"><span>5</span><div class="note"><textarea></textarea></div></div>
            <div class="day"><span>6</span><div class="note"><textarea></textarea></div></div>
            <div class="day"><span>7</span><div class="note"><textarea></textarea></div></div>
            <!-- Repeat for all days of the month -->
        </div>
    </div>
</body>

</html>

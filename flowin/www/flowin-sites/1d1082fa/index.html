<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Calendar</title>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        background-color: #f9f9f9;
    }
    .container {
        max-width: 800px;
        margin: 20px auto;
        padding: 20px;
        background-color: #fff;
        border-radius: 5px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    }
    h1 {
        text-align: center;
    }
    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
    }
    th, td {
        border: 1px solid #ddd;
        padding: 10px;
        text-align: center;
    }
    th {
        background-color: #f2f2f2;
    }
    .add-event {
        text-align: center;
        margin-top: 20px;
    }
</style>
</head>
<body>
<div class="container">
    <h1>Event Calendar</h1>
    <table>
        <thead>
            <tr>
                <th>January</th>
                <th>February</th>
                <th>March</th>
                <!-- Add more months here -->
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Event 1</td>
                <td></td>
                <td></td>
                <!-- Add more event slots here -->
            </tr>
            <tr>
                <td>Event 2</td>
                <td></td>
                <td></td>
                <!-- Add more event slots here -->
            </tr>
            <!-- Add more event rows here -->
        </tbody>
    </table>
    <div class="add-event">
        <input type="text" placeholder="Enter event name">
        <select>
            <option value="1">January</option>
            <option value="2">February</option>
            <option value="3">March</option>
            <!-- Add more months here -->
        </select>
        <button>Add Event</button>
    </div>
</div>
</body>
</html>
